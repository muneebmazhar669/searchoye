<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchOye</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <img src="Group 4.png" alt="SearchOye Logo">
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="Search anything..." autocomplete="off">
            <button class="icon-search" id="search-btn" aria-label="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </div>
        <p class="tagline">Pakistan's first search engine</p>
    </div>

    <footer>
        <p class="footer-brand">
            <a href="">SearchOye</a> &mdash; Pakistan's First Search Engine
        </p>
        <p class="footer-links">
            <a href="">Terms</a> &amp; <a href="">Conditions</a>
        </p>
        <p class="footer-copy">
            &copy; 2025. All rights reserved.
        </p>
    </footer>

    <script>
        const input = document.getElementById('search-input');
        const btn   = document.getElementById('search-btn');
        function doSearch() {
            const q = input.value.trim();
            if (!q) return;
            window.location.href = `results.html?q=${encodeURIComponent(q)}`;
        }
        btn.addEventListener('click', doSearch);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    </script>
</body>
</html>
